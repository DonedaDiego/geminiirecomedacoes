name: DB Sync Scheduler - Sincronização Automática B3

# Timezone de referência: America/Sao_Paulo (UTC-3)
# GitHub Actions usa UTC — horários convertidos abaixo.

on:
  schedule:
    # 1ª tentativa: 07:30 BRT = 10:30 UTC
    - cron: '30 10 * * *'
    # 2ª tentativa: 08:00 BRT = 11:00 UTC (se a 1ª não resolveu)
    - cron: '0 11 * * *'

  workflow_dispatch:

jobs:
  db-sync-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verificar e sincronizar banco de dados B3
        run: |
          echo "=== Verificação automática do banco de dados B3 ==="
          echo "Horário UTC : $(date -u)"
          echo "Horário BRT : $(TZ='America/Sao_Paulo' date)"
          echo ""

          BASE_URL="https://app-geminii.railway.app"

          # ── 1. Obter status atual do banco ───────────────────────
          echo "Consultando status do banco..."
          STATUS=$(curl -sf --max-time 30 "$BASE_URL/railway/status" || echo '{}')
          echo "Status raw: $STATUS"

          ULTIMA_DATA=$(echo "$STATUS" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('ultima_atualizacao') or '')" 2>/dev/null || echo "")

          ONTEM=$(TZ='America/Sao_Paulo' date -d "yesterday" +%d/%m/%Y)

          echo ""
          echo "Última data no banco : $ULTIMA_DATA"
          echo "Data esperada (ontem): $ONTEM"
          echo ""

          # ── 2. Checar se precisa sincronizar ─────────────────────
          if [ "$ULTIMA_DATA" = "$ONTEM" ]; then
            echo "✅ Banco já está atualizado com $ONTEM — nenhuma ação necessária."
            exit 0
          fi

          echo "⚠️  Banco desatualizado. Disparando sincronização..."

          # ── 3. Chamar o endpoint de sync existente ────────────────
          RESPONSE=$(curl -s -o /tmp/sync.json -w "%{http_code}" \
            -X POST "$BASE_URL/railway/sync" \
            -H "Content-Type: application/json" \
            --connect-timeout 15 \
            --max-time 60)

          echo "HTTP sync status : $RESPONSE"
          echo "Resposta sync    : $(cat /tmp/sync.json 2>/dev/null || echo '(sem corpo)')"

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ ERRO: /railway/sync retornou HTTP $RESPONSE"
            exit 1
          fi

          echo ""
          echo "✅ Sincronização disparada com sucesso!"
          echo "=== Concluído ==="
