name: DB Sync Scheduler - Sincronização Automática B3

# Timezone de referência: America/Sao_Paulo (UTC-3)
# Todas as horas abaixo estão expressas em UTC para o cron do GitHub Actions.

on:
  schedule:
    # 1ª tentativa: 07:30 BRT (America/Sao_Paulo) = 10:30 UTC
    - cron: '30 10 * * *'
    # 2ª tentativa: 08:00 BRT (America/Sao_Paulo) = 11:00 UTC
    # Executada apenas se a 1ª ainda não resolveu; após esta, nenhuma ação adicional.
    - cron: '0 11 * * *'

  # Permite execução manual pelo GitHub para testes ou intervenção pontual
  workflow_dispatch:

jobs:
  db-sync-check:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar e sincronizar banco de dados B3
        run: |
          echo "=== Verificação automática do banco de dados B3 ==="
          echo "Horário UTC: $(date -u)"
          echo "Horário BRT estimado: $(TZ='America/Sao_Paulo' date)"

          RESPONSE=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -X POST https://app-geminii.railway.app/railway/auto-sync \
            -H "Content-Type: application/json" \
            --max-time 30)

          echo "HTTP status: $RESPONSE"
          echo "Resposta: $(cat /tmp/body.json)"

          if [ "$RESPONSE" != "200" ]; then
            echo "ERRO: endpoint retornou HTTP $RESPONSE"
            exit 1
          fi

          ATUALIZADO=$(cat /tmp/body.json | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('banco_atualizado','?'))")

          SYNC=$(cat /tmp/body.json | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('sync_disparado','?'))")

          echo "---"
          echo "Banco atualizado: $ATUALIZADO"
          echo "Sync disparado  : $SYNC"
          echo "=== Verificação concluída ==="
