<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>DRE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#141414;--bg3:#1a1a1a;--bg4:#1f1f1f;
  --border:#222;--border2:#2a2a2a;
  --text:#e8e8e8;--muted:#666;--muted2:#999;
  --accent:#fb1ebb;--green:#27ae60;--red:#e74c3c;--gold:#f39c12;
  --mono:'IBM Plex Mono',monospace;--sans:'Montserrat',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;padding:20px 24px;}

.titulo{font-family:var(--sans);font-size:15px;font-weight:700;margin-bottom:2px;}
.subtitulo{font-size:11px;color:var(--muted);margin-bottom:20px;letter-spacing:.5px;}

table{border-collapse:collapse;width:100%;}

/* HEADER */
thead tr th{
  background:var(--bg3);padding:7px 12px;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);font-weight:500;
  border-bottom:2px solid var(--border2);white-space:nowrap;
}
thead tr th:first-child{text-align:left;min-width:200px;}
thead tr th:not(:first-child){text-align:right;}

/* GRUPO */
tr.grupo td{
  background:#1c1014;color:var(--accent);
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  padding:5px 12px;border-top:1px solid #2a1520;border-bottom:1px solid #2a1520;
  font-family:var(--sans);font-weight:600;
}

/* DEST — subtotais importantes */
tr.dest td{
  background:#161616;font-weight:700;font-size:13px;
  padding:7px 12px;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);
}
tr.dest td:first-child{color:var(--text);}
tr.dest td:not(:first-child){text-align:right;}

/* FINAL — lucro liquido */
tr.final td{
  background:#0f1a12;font-weight:700;font-size:13px;
  padding:7px 12px;border-top:2px solid #1a3020;border-bottom:2px solid #1a3020;
}
tr.final td:first-child{color:var(--green);}
tr.final td:not(:first-child){text-align:right;}

/* LINHA NORMAL */
tr.linha td{
  padding:5px 12px;border-bottom:1px solid #191919;
  color:var(--muted2);font-size:12px;
}
tr.linha:hover td{background:#171717;color:var(--text);}
tr.linha td:first-child{color:var(--text);padding-left:24px;}
tr.linha td:not(:first-child){text-align:right;}

/* LINHA PCT */
tr.pct td{
  padding:3px 12px 5px;border-bottom:1px solid #191919;
  color:var(--muted);font-size:10px;font-style:italic;
}
tr.pct td:first-child{padding-left:28px;color:var(--muted);}
tr.pct td:not(:first-child){text-align:right;}

/* SEP */
tr.sep td{background:#1e1e1e;height:1px;padding:0;}

/* AH% */
td.ah{font-size:10px;text-align:right!important;min-width:48px;}
td.ah.pos{color:var(--green);}
td.ah.neg{color:var(--red);}
td.ah.neu{color:var(--muted);}

/* AV% */
td.av{font-size:10px;color:var(--muted);text-align:right!important;min-width:44px;}

td.val{min-width:110px;}
</style>
</head><body>

<div class="titulo" id="titulo">DRE Consolidada (DFP)</div>
<div class="subtitulo">Valores em R$ mil &nbsp;|&nbsp; AH% = variacao ano a ano &nbsp;|&nbsp; AV% = sobre Receita Liquida</div>

<div id="root"><div style="color:var(--muted);padding:40px;text-align:center;letter-spacing:2px;font-size:11px;">CARREGANDO...</div></div>

<script>
function getTicker(){const p=new URLSearchParams(window.location.search);return p.get('ticker')||'';}
function getCnpj(){const p=new URLSearchParams(window.location.search);return p.get('cnpj')||'';}
function getParam(){const c=getCnpj();const t=getTicker();return c?'cnpj='+c+(t?'&ticker='+t:''):'ticker='+t;}

function fmt(v){
  if(v===null||v===undefined||isNaN(Number(v))||Number(v)===0) return '-';
  const n=Number(v); const neg=n<0;
  const s=Math.abs(n).toLocaleString('pt-BR',{maximumFractionDigits:0});
  return neg?`(${s})`:s;
}
function fmtP(v){
  if(v===null||v===undefined||isNaN(v)||!isFinite(v)) return '';
  return (v*100).toFixed(1)+'%';
}
function fmtAH(cur,prev){
  if(!cur||!prev||prev===0) return {txt:'-',cls:'neu'};
  const pct=((cur-prev)/Math.abs(prev))*100;
  if(isNaN(pct)||!isFinite(pct)) return {txt:'-',cls:'neu'};
  return {txt:(pct>=0?'+':'')+pct.toFixed(1)+'%', cls:pct>0?'pos':pct<0?'neg':'neu'};
}

async function init(){
  const ticker=getTicker(); const cnpj=getCnpj();
  if(!ticker&&!cnpj){
    document.getElementById('root').innerHTML='<div style="color:#555;padding:40px;text-align:center">Ticker nao informado</div>';
    return;
  }

  const [data, info] = await Promise.all([
    fetch(`/api/dre?${getParam()}`).then(r=>r.json()),
    fetch(`/api/info?${getParam()}`).then(r=>r.json()),
  ]);

  document.getElementById('titulo').textContent =
    `${info.empresa||ticker} — DRE Consolidada (DFP)`;

  const anos = [...new Set(data.map(d=>d.ano))].sort(); // crescente
  const pivot = {};
  data.forEach(d=>{
    if(!pivot[d.cd_conta]) pivot[d.cd_conta]={};
    pivot[d.cd_conta][d.ano] = d.vl_conta;
  });

  const g = (cd,ano) => (pivot[cd]&&pivot[cd][ano]!==undefined) ? pivot[cd][ano] : 0;
  const rec = ano => Math.abs(g('3.01',ano)) || 1;

  // header
  let h = '<table><thead><tr><th>DESCRICAO</th>';
  anos.forEach((a,i)=>{
    if(i>0) h+=`<th class="ah">AH%</th>`;
    h+=`<th class="val">${a}</th><th class="av">AV%</th>`;
  });
  h+='</tr></thead><tbody>';

  // helpers de linha
  const colsValor = (vals, avFn) => {
    let s='';
    vals.forEach((v,i)=>{
      if(i>0){const ah=fmtAH(v,vals[i-1]);s+=`<td class="ah ${ah.cls}">${ah.txt}</td>`;}
      s+=`<td class="val">${fmt(v)}</td><td class="av">${fmtAH && avFn ? fmtP(avFn(v,i)) : ''}</td>`;
    });
    return s;
  };

  const linha = (cd, label, cls='', avFn=null) => {
    const vals = anos.map(a=>g(cd,a));
    let row=`<tr class="${cls||'linha'}"><td>${label}</td>`;
    vals.forEach((v,i)=>{
      if(i>0){const ah=fmtAH(v,vals[i-1]);row+=`<td class="ah ${ah.cls}">${ah.txt}</td>`;}
      row+=`<td class="val">${fmt(v)}</td>`;
      row+=`<td class="av">${avFn ? fmtP(avFn(v,anos[i])) : ''}</td>`;
    });
    return row+'</tr>';
  };

  const linhaCalc = (label, fn, cls='dest', avFn=null) => {
    const vals = anos.map(a=>fn(a));
    let row=`<tr class="${cls}"><td>${label}</td>`;
    vals.forEach((v,i)=>{
      if(i>0){const ah=fmtAH(v,vals[i-1]);row+=`<td class="ah ${ah.cls}">${ah.txt}</td>`;}
      row+=`<td class="val">${fmt(v)}</td>`;
      row+=`<td class="av">${avFn ? fmtP(avFn(v,anos[i])) : ''}</td>`;
    });
    return row+'</tr>';
  };

  const pct = (label, fn) => {
    let row=`<tr class="pct"><td>&nbsp;&nbsp;↳ ${label}</td>`;
    anos.forEach((a,i)=>{
      if(i>0) row+=`<td></td>`;
      row+=`<td colspan="2" style="text-align:right;color:var(--gold)">${fmtP(fn(a))}</td>`;
    });
    return row+'</tr>';
  };

  const grupo = label =>
    `<tr class="grupo"><td colspan="100">${label}</td></tr>`;

  const sep = () => `<tr class="sep"><td colspan="100"></td></tr>`;

  const avRec = (v,ano) => rec(ano) ? v/rec(ano) : null;

  // montar DRE
  h += grupo('RECEITA');
  h += linha('3.01','Receita Liquida','linha', avRec);

  h += grupo('CUSTOS E DESPESAS');
  h += linha('3.02','Custo dos Produtos','linha', avRec);
  h += linhaCalc('Lucro Bruto', a=>g('3.01',a)+g('3.02',a), 'dest', avRec);
  h += pct('Margem Bruta', a=>(g('3.01',a)+g('3.02',a))/rec(a));
  h += sep();
  h += linha('3.04','Despesas Operacionais','linha', avRec);

  h += grupo('EBITDA');
  h += linhaCalc('EBITDA', a=>g('3.05',a)+g('6.01.01.04',a), 'dest', avRec);
  h += pct('Margem EBITDA', a=>(g('3.05',a)+g('6.01.01.04',a))/rec(a));
  h += linha('6.01.01.04','(-) Depreciacao e Amort.','linha', avRec);
  h += linha('3.05','EBIT (Res. Operacional)','linha', avRec);
  h += pct('Margem EBIT', a=>g('3.05',a)/rec(a));

  h += grupo('RESULTADO FINANCEIRO');
  h += sep();
  h += linha('3.06.01','(+) Receitas Financeiras','linha', avRec);
  h += linha('3.06.02','(-) Despesas Financeiras','linha', avRec);
  h += linha('3.07','LAIR','linha', avRec);
  h += linha('3.08','(-) Impostos sobre Lucro','linha', avRec);

  h += grupo('LUCRO LIQUIDO');
  h += sep();
  h += linhaCalc('Lucro Liquido', a=>g('3.09',a)||g('3.11',a), 'final', avRec);
  h += pct('Margem Liquida', a=>((g('3.09',a)||g('3.11',a)))/rec(a));
  h += linha('3.10','Result. Op. Descontinuadas','linha', avRec);

  h += grupo('CAPEX');
  h += sep();
  h += linha('6.02.01','Capex','linha');

  h += '</tbody></table>';
  document.getElementById('root').innerHTML = h;
}

init();
</script>
</body></html>
