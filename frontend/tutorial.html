<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutoriais - Geminii Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#000000',
            light: '#ffffff',
            subtle: 'rgba(255,255,255,0.1)',
            geminii: '#fb1ebb'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a1a 100%);
      min-height: 100vh;
    }
    .gex-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      transition: all 0.3s ease;
    }
    .gex-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(186,57,175,0.15);
      border-color: rgba(186,57,175,0.3);
    }
    .carousel {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 8px;
      scrollbar-width: none;
      cursor: grab;
    }
    .carousel:active { cursor: grabbing; }
    .carousel::-webkit-scrollbar { display: none; }
    .video-card {
      flex-shrink: 0;
      width: 280px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .video-card:hover {
      transform: translateY(-4px);
      border-color: rgba(186,57,175,0.4);
      box-shadow: 0 16px 32px rgba(0,0,0,0.4);
    }
    .video-thumb {
      width: 100%;
      height: 157px;
      background: rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }
    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .video-card:hover .video-thumb img { transform: scale(1.05); }
    .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.15);
      font-size: 36px;
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .video-card:hover .play-overlay { opacity: 1; }
    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fb1ebb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: white;
      box-shadow: 0 0 24px rgba(251,30,187,0.6);
    }
    .duration-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.75);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      color: white;
      font-weight: 500;
    }
    .coming-soon-card {
      flex-shrink: 0;
      width: 280px;
      height: 157px;
      border-radius: 12px;
      border: 1px dashed rgba(255,255,255,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(16px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-backdrop.active { opacity: 1; pointer-events: all; }
    .modal-box {
      width: 100%;
      max-width: 860px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      transform: scale(0.95) translateY(16px);
      transition: transform 0.3s;
    }
    .modal-backdrop.active .modal-box { transform: scale(1) translateY(0); }
    .modal-video { width: 100%; aspect-ratio: 16/9; background: #000; }
    .modal-video iframe { width: 100%; height: 100%; border: none; }
    .search-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: white;
      padding: 10px 16px 10px 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 280px;
    }
    .search-input:focus { border-color: #fb1ebb; }
    .search-input::placeholder { color: rgba(255,255,255,0.3); }
    .carousel-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .carousel-btn:hover {
      background: rgba(251,30,187,0.2);
      border-color: rgba(251,30,187,0.4);
    }
  </style>
</head>

  <div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
    <div class="modal-box">

    function getThumb(id) {
      if (id && !id.startsWith('YOUTUBE_ID'))
        return `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder><i class=fas fa-play-circle></i></div>'">`;
      return `<div class="thumb-placeholder"><i class="fas fa-play-circle"></i></div>`;
    }

    function esc(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

    function renderAll(mods) {
      const c = document.getElementById('mainContent');
      c.innerHTML = '';
      let total = 0;
      mods.forEach(mod => {
        total += mod.videos.length;
        const sec = document.createElement('div');
        sec.className = 'mb-12';
        sec.innerHTML = `
          <div class="flex items-center gap-3 mb-6">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
              <i class="${mod.icon} text-sm" style="color:${mod.iconColor};"></i>
            </div>
            <h2 class="text-xl font-bold text-white">${mod.title}</h2>
            <span class="text-xs font-semibold px-3 py-1 rounded-full" style="${mod.badgeStyle}">${mod.badge}</span>
            <span class="text-xs text-gray-500 ml-auto">${mod.videos.length} vídeos</span>
            <button class="carousel-btn" onclick="sc('c-${mod.id}',-1)"><i class="fas fa-chevron-left"></i></button>
            <button class="carousel-btn" onclick="sc('c-${mod.id}',1)"><i class="fas fa-chevron-right"></i></button>
          </div>
          <div class="gex-card p-6">
            <div class="carousel" id="c-${mod.id}">
              ${mod.videos.map(v=>`
                <div class="video-card" onclick="openModal('${v.id}','${esc(v.title)}','${esc(v.desc)}','${esc(mod.title)}')">
                  <div class="video-thumb">
                    ${getThumb(v.id)}
                    <div class="play-overlay"><div class="play-btn"><i class="fas fa-play"></i></div></div>
                    <div class="duration-badge">${v.duration}</div>
                  </div>
                  <div class="p-4">
                    <div class="text-xs font-semibold uppercase tracking-wider mb-2" style="color:${mod.iconColor};">${mod.title}</div>
                    <div class="text-sm font-semibold text-white mb-2 leading-snug">${v.title}</div>
                    <div class="text-xs text-gray-400 leading-relaxed" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${v.desc}</div>
                  </div>
                </div>
              `).join('')}
              <div class="coming-soon-card"><i class="fas fa-plus text-xl"></i><span>Em breve</span></div>
            </div>
          </div>`;
        c.appendChild(sec);
        initDrag(`c-${mod.id}`);
      });
      document.getElementById('totalCount').textContent = total;
    }

    function sc(id, dir) { document.getElementById(id).scrollBy({left:dir*320,behavior:'smooth'}); }

    function initDrag(id) {
      const el = document.getElementById(id);
      let down=false, sx, sl;
      el.addEventListener('mousedown',e=>{down=true;sx=e.pageX-el.offsetLeft;sl=el.scrollLeft;});
      el.addEventListener('mouseleave',()=>down=false);
      el.addEventListener('mouseup',()=>down=false);
      el.addEventListener('mousemove',e=>{if(!down)return;e.preventDefault();el.scrollLeft=sl-(e.pageX-el.offsetLeft-sx);});
    }

    function openModal(videoId, title, desc, module) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalDesc').textContent = desc;
      document.getElementById('modalModule').textContent = module;
      const src = videoId && !videoId.startsWith('YOUTUBE_ID') ? `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0` : '';
      document.getElementById('modalIframe').src = src;
      document.getElementById('modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('modalIframe').src = '';
      document.body.style.overflow = '';
    }

    function handleBackdropClick(e) { if(e.target===document.getElementById('modal')) closeModal(); }
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

    function filterVideos(q) {
      q = q.toLowerCase().trim();
      if (!q) { renderAll(MODULES); return; }
      const f = MODULES.map(m=>({...m,videos:m.videos.filter(v=>v.title.toLowerCase().includes(q)||v.desc.toLowerCase().includes(q))})).filter(m=>m.videos.length>0);
      renderAll(f);
    }

    renderAll(MODULES);
  </script>
</body>
